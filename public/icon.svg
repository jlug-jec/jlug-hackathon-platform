<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg {
      fill: #050c14;
    }

    .surface {
      fill: #0b1726;
      stroke: #00e6b8;
      stroke-width: 2;
    }

    .code {
      fill: #00e6b8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .brand {
      fill: #a7fbe9;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    @media (prefers-color-scheme: light) {
      .bg {
        fill: #ecfffa;
      }

      .surface {
        fill: #ffffff;
        stroke: #00a887;
      }

      .code {
        fill: #007f67;
      }

      .brand {
        fill: #005848;
      }
    }
  </style>

  <rect class="bg" x="0" y="0" width="180" height="180" rx="36" />
  <rect class="surface" x="20" y="20" width="140" height="140" rx="26" />
  <text class="code" x="90" y="94" text-anchor="middle">&lt;/&gt;</text>
  <text class="brand" x="90" y="125" text-anchor="middle">CK</text>
</svg>